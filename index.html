<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyPro - Tutor Virtual</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f2f8ff; }
    input, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
    button { padding: 10px 20px; border-radius: 5px; border: none; background: #007bff; color: white; cursor: pointer; margin-top: 10px; }
    button:hover { background: #0056b3; }
    #study-result, #assistant-suggestions { margin-top: 20px; padding: 10px; border-radius: 5px; background: #e6f0ff; }
  </style>
</head>
<body>

  <h1>StudyPro - Tutor Virtual</h1>

  <div id="login-screen">
    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="login-btn">Entrar / Registrarse</button>
  </div>

  <div id="home-screen" style="display:none;">
    <textarea id="text-input" placeholder="Escribe tu pregunta aquí"></textarea>
    <button id="study-btn">Preguntar al tutor</button>
    <div id="study-result"></div>
    <div id="assistant-suggestions"></div>
    <p>Streak diario: <span id="streak-count">0</span></p>
    <button id="logout-btn">Cerrar sesión</button>
  </div>

<script>
  // --------------------- FIREBASE CONFIG ---------------------
  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_PROJECT_ID.firebaseapp.com",
    projectId: "TU_PROJECT_ID",
    storageBucket: "TU_PROJECT_ID.appspot.com",
    messagingSenderId: "TU_SENDER_ID",
    appId: "TU_APP_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const loginScreen = document.getElementById("login-screen");
  const homeScreen = document.getElementById("home-screen");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const loginBtn = document.getElementById("login-btn");
  const logoutBtn = document.getElementById("logout-btn");
  const streakCount = document.getElementById("streak-count");

  // --------------------- LOGIN / REGISTER ---------------------
  loginBtn.addEventListener("click", () => {
    const email = emailInput.value;
    const pass = passwordInput.value;
    auth.signInWithEmailAndPassword(email, pass)
      .catch(() => auth.createUserWithEmailAndPassword(email, pass));
  });

  logoutBtn.addEventListener("click", () => auth.signOut());

  auth.onAuthStateChanged(user => {
    if (user) {
      loginScreen.style.display = "none";
      homeScreen.style.display = "block";
      updateStreak(user.uid);
    } else {
      loginScreen.style.display = "block";
      homeScreen.style.display = "none";
    }
  });

  // --------------------- ACTUALIZAR STREAK ---------------------
  function updateStreak(uid) {
    const today = new Date().toISOString().slice(0,10);
    db.collection("stats").doc(uid).get().then(doc => {
      let streak = doc.data()?.streak || 0;
      const lastDate = doc.data()?.lastDate || "";
      if (lastDate !== today) streak += 1;
      streakCount.innerText = streak;
      db.collection("stats").doc(uid).set({ streak, lastDate: today });
    });
  }

  // --------------------- IA TUTOR ---------------------
  const studyBtn = document.getElementById("study-btn");
  const textInput = document.getElementById("text-input");
  const studyResult = document.getElementById("study-result");
  const assistantSuggestions = document.getElementById("assistant-suggestions");

  studyBtn.addEventListener("click", async () => {
    const user = auth.currentUser;
    if (!user) return alert("Debes iniciar sesión primero");
    const text = textInput.value.trim();
    if (!text) return alert("Escribe tu pregunta");

    studyResult.innerText = "Procesando...";

    try {
      const response = await fetch("https://hf.space/embed/akhaliq/mini-gpt4/+/api/predict/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ data: [text] })
      });
      const data = await response.json();
      studyResult.innerText = data?.data?.[0] || "No se obtuvo respuesta";

      assistantSuggestions.innerHTML = `
        <p>📌 Resume con tus palabras.</p>
        <p>📌 Divide la tarea en pasos.</p>
        <p>📌 Revisa los conceptos principales.</p>
      `;

      // Actualizar streak
      const today = new Date().toISOString().slice(0,10);
      db.collection("stats").doc(user.uid).get().then(doc => {
        let streak = doc.data()?.streak || 0;
        const lastDate = doc.data()?.lastDate || "";
        if (lastDate !== today) streak += 1;
        streakCount.innerText = streak;
        db.collection("stats").doc(user.uid).set({ streak, lastDate: today });
      });

    } catch (err) {
      studyResult.innerText = "Error al conectar con la IA";
      console.error(err);
    }
  });
</script>
</body>
</html>
